services:
  postgres:
    image: postgres:16-alpine
    container_name: ucms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ucms_db
      POSTGRES_USER: ucms_user
      POSTGRES_PASSWORD: ucms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ucms_network

  redis:
    image: redis:alpine
    container_name: ucms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ucms_network
  
  laravel-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ucms_laravel_api
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - ucms_network
    
  python-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: ucms_python_ai
    restart: unless-stopped
    volumes:
      - ./ai:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - ucms_network

  nginx:
    image: nginx:alpine
    container_name: ucms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./api:/var/www/html
    depends_on:
      - laravel-api
      - python-ai
    networks:
      - ucms_network

networks:
  ucms_network:
    driver: bridge

volumes:
  postgres_data: